name: Build

on: [push, pull_request]

jobs:
  lint-and-build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version: 'stable'
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Lint
        if: matrix.platform == 'ubuntu-latest'
        run: make lint
      - name: Build
        run: make build
